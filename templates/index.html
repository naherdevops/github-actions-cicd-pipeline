<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Zero To Hero</title>
<style>
body {
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    font-family:sans-serif;
    color:#e0e0e0;
    text-align:center;
}
.container { max-width:600px; }
h1 {
    background:linear-gradient(90deg,#00d2ff,#7b2ff7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.badge {
    margin:15px 0;
    padding:5px 15px;
    border:1px solid #7b2ff7;
    border-radius:20px;
    display:inline-block;
}
.status {
    margin-top:20px;
    font-size:14px;
    color:#9ca3af;
}
</style>
</head>
<body>

<div class="container">
    <h1>DevOps Zero To Hero</h1>
    <div class="badge">Batch 10 (Edition)</div>

    <p>Flask | Python | AWS ECS</p>

    <div class="status">
        Build ✅ | Test ✅ | Lint ✅ | Deploy 🚀 (GitHub Actions)
    </div>
</div>

</body>
</html>
