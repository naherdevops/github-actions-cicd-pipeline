
# This is the workflow name
name: Hello

# runs on a trigger
on: 
  workflow_dispatch: 
  
# These are jobs inside the workflow
jobs: 

  # This is the name of the job 1
   greet:
     # This is a GitHub runner. each job runs on a runner
     runs-on: ubuntu-latest
     steps:
       - name: say hello to users
         run: echo "Hello Friends" 
        
       - name: say hello to username
         run: echo " Hello $USER" 
         
    # This is the name of the job 2      
   show-version:
     runs-on: ubuntu-latest 
     steps:
      - name: version of python, docker, etc
        run:  docker --version && python --version
    
  
         
